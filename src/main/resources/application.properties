#Quinoa
quarkus.quinoa.package-manager-install.node-version=20.10.0
quarkus.quinoa.package-manager-install=true
quarkus.quinoa.ui-root-path=quinoa

#Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/quarkus_db
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres
quarkus.hibernate-orm.schema-management.strategy=drop-and-create

#Smallrye-openapi
quarkus.smallrye-openapi.info-title=Holiday API
quarkus.swagger-ui.always-include=true